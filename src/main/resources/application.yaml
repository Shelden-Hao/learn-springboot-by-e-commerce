spring:
  application:
    name: demo

  # ========== 数据源 & JPA 配置 ==========
  datasource:
    # H2 内嵌数据库，数据存内存，重启即清空
    url: jdbc:h2:mem:demo_db;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true       # 开启 H2 控制台，浏览器访问 /h2-console 可直连数据库
      path: /h2-console   # 控制台页面路径

  jpa:
    hibernate:
      ddl-auto: create-drop  # 启动时自动建表，关闭时自动删表（开发环境用）
    show-sql: true           # 在控制台打印 SQL 语句（学习必备！）
    properties:
      hibernate:
        format_sql: true     # 格式化 SQL，方便阅读

server:
  port: 8080

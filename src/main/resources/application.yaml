spring:
  application:
    name: demo

  # ========== 默认激活 dev 环境 ==========
  # 加载顺序
  #  ① application.yaml          ← 公共配置，所有环境共享
  #  ② application-{active}.yaml ← 激活的环境配置（dev 或 prod），覆盖同名字段
  profiles:
    active: dev

  # ========== Spring Cache — Redis ==========
  cache:
    type: redis
    redis:
      time-to-live: 600000

  # ========== 文件上传大小限制 ==========
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ========== Sa-Token 配置 ==========
sa-token:
  token-name: satoken
  timeout: 2592000

# ========== MyBatis-Plus 配置 ==========
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
  type-enums-package: com.example.demo.model

spring:
  application:
    name: demo

  # ========== 数据源 — Docker MySQL ==========
  datasource:
    url: jdbc:mysql://localhost:3306/demo_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: demo_user
    password: demo_pass

  # 启动时自动执行 schema.sql 建表
  sql:
    init:
      mode: always

# ========== MyBatis-Plus ==========
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  type-enums-package: com.example.demo.model

# ========== Sa-Token ==========
sa-token:
  # Token 名称（前端 Header 中传：satoken: xxx）
  token-name: satoken
  # Token 有效期（秒），默认 30 天 = 2592000
  timeout: 2592000
  # 是否允许同一账号多地同时登录（true=允许，false=后登录挤掉前一个）
  is-concurrent: true
  # 是否输出 Sa-Token 的操作日志
  is-log: true

server:
  port: 8080

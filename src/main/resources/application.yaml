spring:
  application:
    name: demo

  # ========== 数据源配置 ==========
  datasource:
    url: jdbc:h2:mem:demo_db;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  # schema.sql / data.sql 自动执行（建表 + 初始化数据）
  sql:
    init:
      mode: always

# ========== MyBatis-Plus 配置 ==========
mybatis-plus:
  # XML 映射文件路径：告诉 MyBatis 去哪里找 OrderMapper.xml
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    # 控制台打印 SQL（学习必备！）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 下划线 → 驼峰自动映射：image_url → imageUrl（默认开启，显式写出便于理解）
    map-underscore-to-camel-case: true
  # 枚举包路径：告诉 MyBatis-Plus 去哪里扫描枚举的 TypeHandler
  type-enums-package: com.example.demo.model

server:
  port: 8080
